<!DOCTYPE html>
<html>
<head>

<title>SpiderFly Dispatch</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
background:#08122c;
color:white;
margin:0;
}

header{
background:#162055;
padding:20px;
font-size:28px;
text-align:center;
}

.container{
padding:30px;
}

button{
padding:10px 15px;
background:#ff3b3b;
border:none;
color:white;
cursor:pointer;
}

.flightCard{
background:#1c2557;
padding:20px;
border-radius:10px;
margin-top:20px;
width:420px;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #333;
}

#map{
height:450px;
margin-top:30px;
}

</style>

</head>

<body>

<header>SpiderFly Dispatch Center</header>

<div class="container">

<button onclick="loadFlights()">Load Real Flights</button>

<div class="flightCard" id="flightCard">
Click Load Flights
</div>

<table>

<thead>
<tr>
<th>Airline</th>
<th>Flight</th>
<th>Route</th>
<th>Aircraft</th>
<th>SimBrief</th>
<th>Status</th>
</tr>
</thead>

<tbody id="flightTable"></tbody>

</table>

<div id="map"></div>

</div>

<script>

const API_KEY = "7c02aa24906f1b41432d40fa3f936e70"

let map = L.map('map').setView([20,0],2)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map)

let markers=[]
let routeLine=null

async function loadFlights(){

let url=`https://api.aviationstack.com/v1/flights?access_key=${API_KEY}&limit=50`

let response = await fetch(url)

let data = await response.json()

displayFlights(data.data)

}

function displayFlights(flights){

let table=document.getElementById("flightTable")

table.innerHTML=""

flights.forEach((f,i)=>{

let airline=f.airline?.name || "Unknown"

let flight=f.flight?.iata || "N/A"

let dep=f.departure?.iata || "?"

let arr=f.arrival?.iata || "?"

let aircraft=f.aircraft?.registration || "Unknown"

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${airline}</td>

<td>${flight}</td>

<td>${dep} → ${arr}</td>

<td>${aircraft}</td>

<td>

<a target="_blank"

href="https://dispatch.simbrief.com/options/custom?orig=${dep}&dest=${arr}">

SimBrief

</a>

</td>

<td>

<button onclick="completeFlight('${flight}')">

Completed

</button>

</td>

`

table.appendChild(tr)

})

}

function completeFlight(flight){

let log=JSON.parse(localStorage.getItem("spiderfly_log")||"[]")

log.push(flight)

localStorage.setItem("spiderfly_log",JSON.stringify(log))

alert("Flight saved to logbook")

}

</script>

</body>
</html>
