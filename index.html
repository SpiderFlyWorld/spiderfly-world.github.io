<!DOCTYPE html>
<html>

<head>

<title>SpiderFly Dispatch Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
color:white;
background:
linear-gradient(rgba(0,0,30,.85),rgba(0,0,30,.85)),
url("https://images.unsplash.com/photo-1504196606672-aef5c9cefc92");
background-size:cover;
background-attachment:fixed;
}

header{
background:#0c1a46;
padding:20px;
font-size:26px;
text-align:center;
font-weight:bold;
}

.container{
width:90%;
margin:auto;
padding:20px;
text-align:center;
}

select,button{
padding:10px;
margin:6px;
font-size:14px;
border-radius:6px;
border:none;
}

button{
background:#ff3b3b;
color:white;
cursor:pointer;
}

.flightBox{
background:#15205a;
padding:25px;
border-radius:10px;
display:inline-block;
margin-top:20px;
min-width:350px;
}

.aircraftImg{
width:240px;
}

#map{
height:420px;
margin-top:30px;
border-radius:10px;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
width:70%;
background:#111a40;
}

td,th{
padding:8px;
border-bottom:1px solid #444;
}

</style>

</head>

<body>

<header>SpiderFly Dispatch Center</header>

<div class="container">

<h3>Flight Generator</h3>

<select id="airline"></select>

<select id="aircraft"></select>

<select id="routeSelect">
<option value="random">Random Route</option>
</select>

<br>

<button onclick="generateFlight()">Generate Flight</button>

<div class="flightBox" id="flight">
Generate a flight
</div>

<div id="map"></div>

<h3>Completed Flights</h3>

<table id="logTable">

<tr>
<th>Flight</th>
<th>Route</th>
<th>Aircraft</th>
<th>Duration</th>
<th>Distance</th>
</tr>

</table>

</div>

<script>

/* AIRPORT DATABASE */

const airports={

EGLL:{name:"Heathrow",city:"London",country:"UK",lat:51.47,lon:-0.45},
EHAM:{name:"Schiphol",city:"Amsterdam",country:"Netherlands",lat:52.31,lon:4.76},
EDDF:{name:"Frankfurt",city:"Frankfurt",country:"Germany",lat:50.03,lon:8.56},
LEMD:{name:"Madrid Barajas",city:"Madrid",country:"Spain",lat:40.47,lon:-3.56},
LFPG:{name:"Charles De Gaulle",city:"Paris",country:"France",lat:49.00,lon:2.55},
LIMC:{name:"Milan Malpensa",city:"Milan",country:"Italy",lat:45.63,lon:8.72},
VIDP:{name:"Indira Gandhi",city:"Delhi",country:"India",lat:28.55,lon:77.10},
VABB:{name:"Mumbai Intl",city:"Mumbai",country:"India",lat:19.08,lon:72.86},
OMDB:{name:"Dubai Intl",city:"Dubai",country:"UAE",lat:25.25,lon:55.36},
KJFK:{name:"JFK",city:"New York",country:"USA",lat:40.64,lon:-73.77}

}

/* AIRLINES */

const airlines={

EasyJet:{
aircraft:["A320","A321"],
tails:["G-EZUI","G-EZTB","G-EZAP"],
routes:[
["EGLL","EHAM"],
["EGLL","LFPG"],
["EGLL","LEMD"],
["EHAM","LIMC"]
]
},

Lufthansa:{
aircraft:["A320","A321","A330-300"],
tails:["D-AIQA","D-AIKO","D-AIKP"],
routes:[
["EDDF","EGLL"],
["EDDF","EHAM"],
["EDDF","LFPG"]
]
},

Emirates:{
aircraft:["A380","B777","A330-300"],
tails:["A6-EOD","A6-EVB","A6-EGC"],
routes:[
["OMDB","EGLL"],
["OMDB","KJFK"],
["OMDB","VIDP"]
]
}

}

/* AIRCRAFT IMAGES */

const aircraftImages={
"A320":"https://upload.wikimedia.org/wikipedia/commons/3/3f/Airbus_A320-200.png",
"A321":"https://upload.wikimedia.org/wikipedia/commons/0/0c/Airbus_A321.png",
"A330-300":"https://upload.wikimedia.org/wikipedia/commons/4/4f/Airbus_A330-300.png",
"A380":"https://upload.wikimedia.org/wikipedia/commons/9/9e/Airbus_A380_blue_sky.png",
"B777":"https://upload.wikimedia.org/wikipedia/commons/0/0f/Boeing_777-300ER.png"
}

/* MAP */

let map=L.map('map').setView([30,10],3)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map)

let routeLayer

/* INIT */

function init(){

let airlineSelect=document.getElementById("airline")

Object.keys(airlines).forEach(a=>{
let opt=document.createElement("option")
opt.value=a
opt.text=a
airlineSelect.add(opt)
})

updateAircraft()

}

document.getElementById("airline").onchange=updateAircraft

function updateAircraft(){

let airline=document.getElementById("airline").value

let aircraftSelect=document.getElementById("aircraft")

aircraftSelect.innerHTML=""

airlines[airline].aircraft.forEach(a=>{
let opt=document.createElement("option")
opt.value=a
opt.text=a
aircraftSelect.add(opt)
})

updateRoutes()

}

function updateRoutes(){

let airline=document.getElementById("airline").value
let routeSelect=document.getElementById("routeSelect")

routeSelect.innerHTML='<option value="random">Random Route</option>'

airlines[airline].routes.forEach(r=>{
let opt=document.createElement("option")
opt.value=r.join("-")
opt.text=r[0]+" → "+r[1]
routeSelect.add(opt)
})

}

/* DISTANCE */

function distance(lat1,lon1,lat2,lon2){

let R=6371

let dLat=(lat2-lat1)*Math.PI/180
let dLon=(lon2-lon1)*Math.PI/180

let a=Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2)

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return Math.round(R*c*0.539957)

}

/* GENERATE */

function generateFlight(){

let airline=document.getElementById("airline").value
let aircraft=document.getElementById("aircraft").value
let routeChoice=document.getElementById("routeSelect").value

let route

if(routeChoice=="random")
route=airlines[airline].routes[Math.floor(Math.random()*airlines[airline].routes.length)]
else
route=routeChoice.split("-")

let dep=route[0]
let arr=route[1]

let depData=airports[dep]
let arrData=airports[arr]

let dist=distance(depData.lat,depData.lon,arrData.lat,arrData.lon)

let duration=Math.round(dist/450*60)
let hrs=Math.floor(duration/60)
let mins=duration%60

let tail=airlines[airline].tails[Math.floor(Math.random()*airlines[airline].tails.length)]

let flight=airline.substring(0,2).toUpperCase()+Math.floor(Math.random()*900+100)

document.getElementById("flight").innerHTML=

"<img class='aircraftImg' src='"+aircraftImages[aircraft]+"'><br>"+

"<h3>"+airline+"</h3>"+

"<b>Aircraft:</b> "+aircraft+"<br>"+

"<b>Tail:</b> "+tail+"<br>"+

"<b>Flight:</b> "+flight+

"<hr>"+

"<b>Departure</b><br>"+

dep+" — "+depData.name+"<br>"+

depData.city+", "+depData.country+

"<br><br>"+

"<b>Arrival</b><br>"+

arr+" — "+arrData.name+"<br>"+

arrData.city+", "+arrData.country+

"<br><br>"+

"<b>Distance:</b> "+dist+" NM<br>"+

"<b>Duration:</b> "+hrs+"h "+mins+"m<br>"+

"<br>"+

"<a target='_blank' href='https://dispatch.simbrief.com/options/custom?orig="+dep+"&dest="+arr+"'>Generate in SimBrief</a>"

let depCoord=[depData.lat,depData.lon]
let arrCoord=[arrData.lat,arrData.lon]

if(routeLayer) map.removeLayer(routeLayer)

routeLayer=L.polyline([depCoord,arrCoord],{color:"red"}).addTo(map)

map.setView(depCoord,4)

L.marker(depCoord).addTo(map)
.bindPopup(depData.name+"<br>"+depData.city+", "+depData.country)

L.marker(arrCoord).addTo(map)
.bindPopup(arrData.name+"<br>"+arrData.city+", "+arrData.country)

}

init()

</script>

</body>
</html>
