<!DOCTYPE html>
<html>
<head>

<title>SpiderFly Dispatch Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
color:white;
background:
linear-gradient(rgba(0,0,40,0.85),rgba(0,0,40,0.85)),
url("https://images.unsplash.com/photo-1504198266285-1659872e6590");
background-size:cover;
background-attachment:fixed;
text-align:center;
}

header{
background:#162055;
padding:25px;
font-size:32px;
font-weight:bold;
}

.container{
padding:40px;
}

select,button{
padding:10px;
font-size:16px;
margin:5px;
}

button{
background:#ff3b3b;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.flightBox{
background:#1c2557;
padding:25px;
border-radius:10px;
display:inline-block;
min-width:360px;
margin-top:20px;
}

#map{
height:450px;
width:85%;
margin:auto;
margin-top:30px;
border-radius:10px;
}

.logo{
height:60px;
margin-bottom:10px;
}

.dashboard{
width:85%;
margin:auto;
margin-top:30px;
background:#1c2557;
padding:15px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #444;
}

</style>

</head>

<body>

<header>SpiderFly Dispatch Center</header>

<div class="container">

<h2>Generate Flight</h2>

<select id="aircraft">
<option value="ANY">Any Aircraft</option>
<option>A320</option>
<option>A321</option>
<option>B737</option>
<option>B787</option>
<option>B777</option>
<option>A350</option>
<option>A380</option>
</select>

<br>

<button onclick="generateFlight()">Generate Flight</button>
<button onclick="logFlight()">Mark Completed</button>

<div class="flightBox" id="flight">
Click Generate Flight
</div>

<div id="map"></div>

<div class="dashboard">

<h3>Pilot Logbook</h3>

<table id="logTable">
<tr>
<th>Flight</th>
<th>Route</th>
<th>Aircraft</th>
<th>Distance</th>
</tr>
</table>

</div>

<div class="dashboard">

<h3>Flight Statistics</h3>

<p id="stats"></p>

</div>

</div>

<script>

/* AIRPORT DATABASE */

const airports={

KATL:{name:"Atlanta",country:"USA",lat:33.64,lon:-84.42},
KJFK:{name:"New York",country:"USA",lat:40.64,lon:-73.77},
KLAX:{name:"Los Angeles",country:"USA",lat:33.94,lon:-118.40},
EHAM:{name:"Amsterdam",country:"Netherlands",lat:52.31,lon:4.76},
EGLL:{name:"London",country:"UK",lat:51.47,lon:-0.45},
EDDF:{name:"Frankfurt",country:"Germany",lat:50.03,lon:8.56},
OTHH:{name:"Doha",country:"Qatar",lat:25.27,lon:51.60},
OMDB:{name:"Dubai",country:"UAE",lat:25.25,lon:55.36},
VIDP:{name:"Delhi",country:"India",lat:28.55,lon:77.10},
VABB:{name:"Mumbai",country:"India",lat:19.08,lon:72.86}

}

/* AIRLINE DATA */

const airlines=[

{name:"KLM",logo:"https://upload.wikimedia.org/wikipedia/commons/4/4c/KLM_logo.svg"},
{name:"Emirates",logo:"https://upload.wikimedia.org/wikipedia/commons/d/d0/Emirates_logo.svg"},
{name:"Qatar Airways",logo:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Qatar_Airways_Logo.svg"},
{name:"Delta",logo:"https://upload.wikimedia.org/wikipedia/commons/d/d1/Delta_logo.svg"},
{name:"IndiGo",logo:"https://upload.wikimedia.org/wikipedia/commons/0/0f/IndiGo_Logo.svg"},
{name:"Lufthansa",logo:"https://upload.wikimedia.org/wikipedia/commons/d/d8/Lufthansa_Logo.svg"}

]

/* AIRCRAFT */

const aircraftTypes=["A320","A321","B737","B787","B777","A350","A380"]

/* MAP */

let map=L.map('map').setView([20,0],2)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let routeLayer

/* STATS */

let totalFlights=0
let routeStats={}
let aircraftStats={}

let lastFlight=null

function rand(list){
return list[Math.floor(Math.random()*list.length)]
}

/* GENERATOR */

function generateFlight(){

let selected=document.getElementById("aircraft").value

let aircraft=selected=="ANY"?rand(aircraftTypes):selected

let airline=rand(airlines)

let dep=rand(Object.keys(airports))
let arr=rand(Object.keys(airports))

while(arr==dep){
arr=rand(Object.keys(airports))
}

let flight=airline.name.substring(0,2).toUpperCase()+Math.floor(100+Math.random()*900)

let distance=Math.floor(Math.random()*6000+300)+" NM"

lastFlight={
flight:flight,
route:dep+"-"+arr,
aircraft:aircraft,
distance:distance
}

let depData=airports[dep]
let arrData=airports[arr]

document.getElementById("flight").innerHTML=

"<img class='logo' src='"+airline.logo+"'>"+

"<h3>"+airline.name+"</h3>"+

"<p><b>Aircraft:</b> "+aircraft+"</p>"+

"<p><b>Flight:</b> "+flight+"</p>"+

"<hr>"+

"<p><b>Departure</b></p>"+

dep+" — "+depData.name+"<br>"+

depData.country+

"<br><br>"+

"<p><b>Arrival</b></p>"+

arr+" — "+arrData.name+"<br>"+

arrData.country+

"<br><br>"+

"<b>Distance:</b> "+distance

/* MAP */

let depCoord=[depData.lat,depData.lon]
let arrCoord=[arrData.lat,arrData.lon]

if(routeLayer){
map.removeLayer(routeLayer)
}

routeLayer=L.polyline([depCoord,arrCoord],{color:'red'}).addTo(map)

map.setView(depCoord,3)

L.marker(depCoord).addTo(map)
L.marker(arrCoord).addTo(map)

}

/* LOGBOOK */

function logFlight(){

if(!lastFlight) return

totalFlights++

routeStats[lastFlight.route]=(routeStats[lastFlight.route]||0)+1
aircraftStats[lastFlight.aircraft]=(aircraftStats[lastFlight.aircraft]||0)+1

let table=document.getElementById("logTable")

let row=table.insertRow()

row.insertCell(0).innerText=lastFlight.flight
row.insertCell(1).innerText=lastFlight.route
row.insertCell(2).innerText=lastFlight.aircraft
row.insertCell(3).innerText=lastFlight.distance

updateStats()

}

/* DASHBOARD */

function updateStats(){

let topRoute=Object.entries(routeStats).sort((a,b)=>b[1]-a[1])[0]
let topAircraft=Object.entries(aircraftStats).sort((a,b)=>b[1]-a[1])[0]

document.getElementById("stats").innerHTML=

"Total Flights: "+totalFlights+"<br>"+

"Most Flown Route: "+(topRoute?topRoute[0]+" ("+topRoute[1]+")":"-")+"<br>"+

"Most Used Aircraft: "+(topAircraft?topAircraft[0]+" ("+topAircraft[1]+")":"-")

}

</script>

</body>
</html>
