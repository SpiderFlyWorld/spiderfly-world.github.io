<!DOCTYPE html>
<html>

<head>

<title>SpiderFly Dispatch Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0c1438;
color:white;
}

header{
background:#09194c;
padding:20px;
font-size:26px;
text-align:center;
}

.controls{
padding:20px;
text-align:center;
}

select,input,button{
padding:10px;
margin:6px;
border-radius:5px;
border:none;
}

button{
background:#ff3b3b;
color:white;
cursor:pointer;
}

table{
width:92%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

#map{
height:420px;
margin:30px;
border-radius:10px;
}

.admin{
background:#111b4a;
padding:15px;
margin:20px;
}

</style>

</head>

<body>

<header>SpiderFly Dispatch Center</header>

<div class="controls">

<select id="airline"></select>

<select id="aircraft"></select>

<button onclick="generateRoutes()">Find Routes</button>

</div>

<table id="routesTable">

<tr>
<th>Flight</th>
<th>From</th>
<th>To</th>
<th>Distance</th>
<th>Duration</th>
<th>SimBrief</th>
<th>Map</th>
<th>Complete</th>
</tr>

</table>

<div id="map"></div>

<h3 style="text-align:center">Pilot Logbook</h3>

<table id="logTable">

<tr>
<th>Flight</th>
<th>Route</th>
<th>Aircraft</th>
<th>Distance</th>
</tr>

</table>

<div id="stats"></div>

<!-- ADMIN PANEL -->

<div class="admin">

<h3>Add Airline</h3>

<input id="newAirline" placeholder="Airline Name">
<button onclick="addAirline()">Add Airline</button>

<h3>Add Aircraft Variant</h3>

<input id="variantAirline" placeholder="Airline Name">
<input id="variantName" placeholder="Aircraft Variant">
<button onclick="addVariant()">Add Variant</button>

<h3>Add Route</h3>

<input id="routeAirline" placeholder="Airline">
<input id="routeFrom" placeholder="FROM ICAO">
<input id="routeTo" placeholder="TO ICAO">

<button onclick="addRoute()">Add Route</button>

</div>

<script>

/* AIRPORT DATABASE */

const airports={
EGLL:{name:"Heathrow",city:"London",country:"UK",lat:51.47,lon:-0.45},
EHAM:{name:"Schiphol",city:"Amsterdam",country:"Netherlands",lat:52.31,lon:4.76},
EDDF:{name:"Frankfurt",city:"Frankfurt",country:"Germany",lat:50.03,lon:8.56},
LFPG:{name:"Charles De Gaulle",city:"Paris",country:"France",lat:49.00,lon:2.55},
OMDB:{name:"Dubai",city:"Dubai",country:"UAE",lat:25.25,lon:55.36},
KJFK:{name:"JFK",city:"New York",country:"USA",lat:40.64,lon:-73.77},
KLAX:{name:"Los Angeles",city:"Los Angeles",country:"USA",lat:33.94,lon:-118.40},
RKSI:{name:"Incheon",city:"Seoul",country:"Korea",lat:37.46,lon:126.44},
RJTT:{name:"Tokyo Haneda",city:"Tokyo",country:"Japan",lat:35.55,lon:139.78}
}

/* LOAD DATABASE */

let airlines=JSON.parse(localStorage.getItem("airlines"))||{

"KLM":["A320","B737","B787"],
"Wizz Air":["A320neo","A321neo"],
"Spirit":["A320","A321"],
"Korean Air":["A330","B777","B787"],
"Emirates":["A380","B777"],
"Qatar Airways":["A350","B777","B787"],
"IndiGo":["A320neo","A321neo"],
"Lufthansa":["A320","A321","A350"],
"EasyJet":["A320","A321"]

}

let routes=JSON.parse(localStorage.getItem("routes"))||[]

/* MAP */

let map=L.map('map').setView([30,10],3)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map)

let routeLayer

/* LOAD AIRLINES */

function init(){

let airlineSelect=document.getElementById("airline")

airlineSelect.innerHTML=""

Object.keys(airlines).forEach(a=>{

let opt=document.createElement("option")
opt.value=a
opt.text=a

airlineSelect.add(opt)

})

updateAircraft()

}

document.getElementById("airline").onchange=updateAircraft

function updateAircraft(){

let airline=document.getElementById("airline").value

let aircraftSelect=document.getElementById("aircraft")

aircraftSelect.innerHTML=""

airlines[airline].forEach(a=>{

let opt=document.createElement("option")
opt.value=a
opt.text=a

aircraftSelect.add(opt)

})

}

/* ADD AIRLINE */

function addAirline(){

let name=document.getElementById("newAirline").value

airlines[name]=[]

localStorage.setItem("airlines",JSON.stringify(airlines))

init()

}

/* ADD VARIANT */

function addVariant(){

let airline=document.getElementById("variantAirline").value
let variant=document.getElementById("variantName").value

airlines[airline].push(variant)

localStorage.setItem("airlines",JSON.stringify(airlines))

init()

}

/* ADD ROUTE */

function addRoute(){

let airline=document.getElementById("routeAirline").value
let from=document.getElementById("routeFrom").value
let to=document.getElementById("routeTo").value

routes.push({airline,from,to})

localStorage.setItem("routes",JSON.stringify(routes))

}

/* DISTANCE */

function distance(lat1,lon1,lat2,lon2){

let R=6371

let dLat=(lat2-lat1)*Math.PI/180
let dLon=(lon2-lon1)*Math.PI/180

let a=Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2)

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return Math.round(R*c*0.539957)

}

/* GENERATE ROUTES */

function generateRoutes(){

let airline=document.getElementById("airline").value
let aircraft=document.getElementById("aircraft").value

let table=document.getElementById("routesTable")

table.innerHTML=`
<tr>
<th>Flight</th>
<th>From</th>
<th>To</th>
<th>Distance</th>
<th>Duration</th>
<th>SimBrief</th>
<th>Map</th>
<th>Complete</th>
</tr>
`

routes
.filter(r=>r.airline===airline)
.forEach(r=>{

let dep=airports[r.from]
let arr=airports[r.to]

if(!dep||!arr) return

let d=distance(dep.lat,dep.lon,arr.lat,arr.lon)

let duration=Math.round(d/450*60)

let hrs=Math.floor(duration/60)
let mins=duration%60

let flight=airline.substring(0,2).toUpperCase()+Math.floor(Math.random()*900)

let row=table.insertRow()

row.insertCell(0).innerText=flight

row.insertCell(1).innerText=
r.from+" "+dep.name+" ("+dep.city+", "+dep.country+")"

row.insertCell(2).innerText=
r.to+" "+arr.name+" ("+arr.city+", "+arr.country+")"

row.insertCell(3).innerText=d+" NM"

row.insertCell(4).innerText=hrs+"h "+mins+"m"

row.insertCell(5).innerHTML=
"<a target='_blank' href='https://dispatch.simbrief.com/options/custom?orig="+r.from+"&dest="+r.to+"'>SimBrief</a>"

row.insertCell(6).innerHTML=
"<button onclick='showRoute(\""+r.from+"\",\""+r.to+"\")'>Map</button>"

row.insertCell(7).innerHTML=
"<button onclick='completeFlight(\""+flight+"\",\""+r.from+"-"+r.to+"\",\""+aircraft+"\",\""+d+"\")'>Done</button>"

})

}

/* MAP */

function showRoute(dep,arr){

let depData=airports[dep]
let arrData=airports[arr]

let depCoord=[depData.lat,depData.lon]
let arrCoord=[arrData.lat,arrData.lon]

if(routeLayer) map.removeLayer(routeLayer)

routeLayer=L.polyline([depCoord,arrCoord],{color:"red"}).addTo(map)

map.setView(depCoord,4)

}

/* LOGBOOK */

let log=JSON.parse(localStorage.getItem("spiderflylog"))||[]

function completeFlight(flight,route,aircraft,distance){

log.push({flight,route,aircraft,distance})

localStorage.setItem("spiderflylog",JSON.stringify(log))

renderLog()

}

function renderLog(){

let table=document.getElementById("logTable")

table.innerHTML="<tr><th>Flight</th><th>Route</th><th>Aircraft</th><th>Distance</th></tr>"

let total=0

log.forEach(f=>{
let row=table.insertRow()
row.insertCell(0).innerText=f.flight
row.insertCell(1).innerText=f.route
row.insertCell(2).innerText=f.aircraft
row.insertCell(3).innerText=f.distance+" NM"
total+=parseInt(f.distance)
})

document.getElementById("stats").innerHTML=
"Flights Completed: "+log.length+" | Total Distance: "+total+" NM"

}

init()
renderLog()

</script>

</body>
</html>
