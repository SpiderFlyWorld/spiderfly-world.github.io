<!DOCTYPE html>
<html>

<head>

<title>SpiderFly Dispatch Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0c1438;
color:white;
}

header{
background:#09194c;
padding:20px;
font-size:26px;
text-align:center;
}

.controls{
padding:20px;
text-align:center;
}

select,button{
padding:10px;
margin:6px;
border-radius:5px;
border:none;
}

button{
background:#ff3b3b;
color:white;
cursor:pointer;
}

table{
width:92%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

#map{
height:420px;
margin:30px;
border-radius:10px;
}

.stats{
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>SpiderFly Dispatch Center</header>

<div class="controls">

<select id="airline"></select>

<select id="aircraft"></select>

<button onclick="generateRoutes()">Find Routes</button>

</div>

<table id="routesTable">

<tr>
<th>Flight</th>
<th>From</th>
<th>To</th>
<th>Distance</th>
<th>Duration</th>
<th>SimBrief</th>
<th>Map</th>
<th>Complete</th>
</tr>

</table>

<div id="map"></div>

<h3 style="text-align:center">Pilot Logbook</h3>

<table id="logTable">

<tr>
<th>Flight</th>
<th>Route</th>
<th>Aircraft</th>
<th>Distance</th>
</tr>

</table>

<div class="stats" id="stats"></div>

<script>

/* AIRPORT DATABASE */

const airports={
EGLL:{name:"Heathrow",city:"London",country:"UK",lat:51.47,lon:-0.45},
EHAM:{name:"Schiphol",city:"Amsterdam",country:"Netherlands",lat:52.31,lon:4.76},
EDDF:{name:"Frankfurt",city:"Frankfurt",country:"Germany",lat:50.03,lon:8.56},
LFPG:{name:"Charles De Gaulle",city:"Paris",country:"France",lat:49.00,lon:2.55},
LEMD:{name:"Madrid",city:"Madrid",country:"Spain",lat:40.47,lon:-3.56},
OMDB:{name:"Dubai",city:"Dubai",country:"UAE",lat:25.25,lon:55.36},
KJFK:{name:"JFK",city:"New York",country:"USA",lat:40.64,lon:-73.77},
KLAX:{name:"Los Angeles",city:"Los Angeles",country:"USA",lat:33.94,lon:-118.40},
VIDP:{name:"Delhi",city:"Delhi",country:"India",lat:28.55,lon:77.10},
VABB:{name:"Mumbai",city:"Mumbai",country:"India",lat:19.08,lon:72.86}
}

/* AIRLINES + FLEETS */

const airlines={

"IndiGo":["A320neo","A321neo","A321XLR","A350-900"],
"Air India":["A320neo","A321neo","B777-300ER","B787-8","B787-9","A350-900","A350-1000"],
"Emirates":["B777-300ER","B777-9","A350-900","A380"],
"Qatar Airways":["B737 MAX 8","A330-300","A350-900","A350-1000","B777X","B787"],
"Singapore Airlines":["B737 MAX 8","A350-900","B777-300ER","B787-10"],
"Lufthansa":["A320neo","A321neo","A340-600","A350-900","B747-8","B787-9"],
"Air France":["A220-300","A320neo","A330-200","A350-900","B777","B787"],
"British Airways":["A320neo","A321neo","A350-1000","A380","B777","B787"],
"EasyJet":["A319","A320neo","A321neo"],
"Ryanair":["B737-800","B737 MAX 8"],
"United":["B737 MAX 8","B737 MAX 9","A321neo","B767","B777","B787"],
"Delta":["A220","A321neo","A330","A350"],
"American":["A321XLR","B737 MAX 8","B777","B787"]

}

/* MAP */

let map=L.map('map').setView([30,10],3)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map)

let routeLayer

/* LOAD AIRLINES */

function init(){

let airlineSelect=document.getElementById("airline")

Object.keys(airlines).forEach(a=>{

let opt=document.createElement("option")
opt.value=a
opt.text=a

airlineSelect.add(opt)

})

updateAircraft()

}

document.getElementById("airline").onchange=updateAircraft

function updateAircraft(){

let airline=document.getElementById("airline").value

let aircraftSelect=document.getElementById("aircraft")

aircraftSelect.innerHTML=""

airlines[airline].forEach(a=>{

let opt=document.createElement("option")
opt.value=a
opt.text=a

aircraftSelect.add(opt)

})

}

/* DISTANCE */

function distance(lat1,lon1,lat2,lon2){

let R=6371

let dLat=(lat2-lat1)*Math.PI/180
let dLon=(lon2-lon1)*Math.PI/180

let a=Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2)

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return Math.round(R*c*0.539957)

}

/* GENERATE ROUTES */

function generateRoutes(){

let airline=document.getElementById("airline").value
let aircraft=document.getElementById("aircraft").value

let table=document.getElementById("routesTable")

table.innerHTML=`
<tr>
<th>Flight</th>
<th>From</th>
<th>To</th>
<th>Distance</th>
<th>Duration</th>
<th>SimBrief</th>
<th>Map</th>
<th>Complete</th>
</tr>
`

let keys=Object.keys(airports)

for(let i=0;i<8;i++){

let dep=keys[Math.floor(Math.random()*keys.length)]
let arr=keys[Math.floor(Math.random()*keys.length)]

if(dep==arr) continue

let d=distance(
airports[dep].lat,
airports[dep].lon,
airports[arr].lat,
airports[arr].lon
)

let duration=Math.round(d/450*60)

let hrs=Math.floor(duration/60)
let mins=duration%60

let flight=airline.substring(0,2).toUpperCase()+Math.floor(Math.random()*900)

let row=table.insertRow()

row.insertCell(0).innerText=flight

row.insertCell(1).innerText=
dep+" — "+airports[dep].name+" ("+
airports[dep].city+", "+airports[dep].country+")"

row.insertCell(2).innerText=
arr+" — "+airports[arr].name+" ("+
airports[arr].city+", "+airports[arr].country+")"

row.insertCell(3).innerText=d+" NM"

row.insertCell(4).innerText=hrs+"h "+mins+"m"

row.insertCell(5).innerHTML=
"<a target='_blank' href='https://dispatch.simbrief.com/options/custom?orig="+dep+"&dest="+arr+"'>SimBrief</a>"

row.insertCell(6).innerHTML=
"<button onclick='showRoute(\""+dep+"\",\""+arr+"\")'>Map</button>"

row.insertCell(7).innerHTML=
"<button onclick='completeFlight(\""+flight+"\",\""+dep+"-"+arr+"\",\""+aircraft+"\",\""+d+"\")'>Done</button>"

}

}

/* MAP */

function showRoute(dep,arr){

let depData=airports[dep]
let arrData=airports[arr]

let depCoord=[depData.lat,depData.lon]
let arrCoord=[arrData.lat,arrData.lon]

if(routeLayer) map.removeLayer(routeLayer)

routeLayer=L.polyline([depCoord,arrCoord],{color:"red"}).addTo(map)

map.setView(depCoord,4)

}

/* LOGBOOK */

let log=JSON.parse(localStorage.getItem("spiderflylog"))||[]

function completeFlight(flight,route,aircraft,distance){

log.push({flight,route,aircraft,distance})

localStorage.setItem("spiderflylog",JSON.stringify(log))

renderLog()

}

function renderLog(){

let table=document.getElementById("logTable")

table.innerHTML=`
<tr>
<th>Flight</th>
<th>Route</th>
<th>Aircraft</th>
<th>Distance</th>
</tr>
`

let total=0

log.forEach(f=>{

let row=table.insertRow()

row.insertCell(0).innerText=f.flight
row.insertCell(1).innerText=f.route
row.insertCell(2).innerText=f.aircraft
row.insertCell(3).innerText=f.distance+" NM"

total+=parseInt(f.distance)

})

document.getElementById("stats").innerHTML=
"Flights Completed: "+log.length+" | Total Distance: "+total+" NM"

}

init()
renderLog()

</script>

</body>
</html>
