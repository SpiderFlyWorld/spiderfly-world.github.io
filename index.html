<!DOCTYPE html>
<html>

<head>

<title>SpiderFly Dispatch Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
color:white;
background:
linear-gradient(rgba(0,0,40,0.85),rgba(0,0,40,0.85)),
url("https://images.unsplash.com/photo-1504198453319-5ce911bafcde");
background-size:cover;
background-attachment:fixed;
}

header{
background:#162055;
padding:20px;
font-size:28px;
font-weight:bold;
text-align:center;
}

.container{
width:90%;
margin:auto;
padding:30px;
text-align:center;
}

button{
padding:10px 15px;
margin:5px;
background:#ff3b3b;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

select{
padding:10px;
}

.flightBox{
background:#1c2557;
padding:25px;
border-radius:10px;
display:inline-block;
min-width:360px;
margin-top:20px;
}

.logo{
height:60px;
margin-bottom:10px;
}

.aircraftImg{
width:240px;
margin:10px 0;
}

#map{
height:450px;
width:90%;
margin:auto;
margin-top:30px;
border-radius:10px;
}

.dashboard{
margin-top:40px;
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:#1c2557;
padding:20px;
border-radius:10px;
width:400px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #444;
padding:6px;
}

</style>

</head>

<body>

<header>SpiderFly Dispatch Center</header>

<div class="container">

<h2>Generate Flight</h2>

<select id="aircraft">
<option value="ANY">Any Aircraft</option>
<option>A320</option>
<option>A321</option>
<option>B737</option>
<option>B787</option>
<option>B777</option>
<option>A350</option>
<option>A380</option>
</select>

<br>

<button onclick="generateFlight()">Generate Flight</button>
<button onclick="logFlight()">Mark Completed</button>

<div class="flightBox" id="flight">
Click Generate Flight
</div>

<div id="map"></div>

<div class="dashboard">

<div class="card">
<h3>Aircraft Usage</h3>
<canvas id="aircraftChart"></canvas>
</div>

<div class="card">
<h3>Top Aircraft</h3>
<div id="topAircraft"></div>
</div>

<div class="card">
<h3>Flight Logbook</h3>

<table id="logTable">
<tr>
<th>Flight</th>
<th>Route</th>
<th>Aircraft</th>
<th>Distance</th>
</tr>
</table>

</div>

</div>

</div>

<script>

/* AIRPORT DATABASE */

const airports={
KATL:{name:"Atlanta",city:"Atlanta",country:"USA",lat:33.64,lon:-84.42},
KJFK:{name:"John F Kennedy Intl",city:"New York",country:"USA",lat:40.64,lon:-73.77},
KLAX:{name:"Los Angeles Intl",city:"Los Angeles",country:"USA",lat:33.94,lon:-118.40},
EHAM:{name:"Schiphol",city:"Amsterdam",country:"Netherlands",lat:52.31,lon:4.76},
EGLL:{name:"Heathrow",city:"London",country:"UK",lat:51.47,lon:-0.45},
EDDF:{name:"Frankfurt Intl",city:"Frankfurt",country:"Germany",lat:50.03,lon:8.56},
OTHH:{name:"Hamad Intl",city:"Doha",country:"Qatar",lat:25.27,lon:51.60},
OMDB:{name:"Dubai Intl",city:"Dubai",country:"UAE",lat:25.25,lon:55.36},
VIDP:{name:"Indira Gandhi Intl",city:"Delhi",country:"India",lat:28.55,lon:77.10},
VABB:{name:"Chhatrapati Shivaji Intl",city:"Mumbai",country:"India",lat:19.08,lon:72.86}
}

/* AIRLINES */

const airlines=[
{name:"KLM",logo:"https://logo.clearbit.com/klm.com"},
{name:"Emirates",logo:"https://logo.clearbit.com/emirates.com"},
{name:"Qatar Airways",logo:"https://logo.clearbit.com/qatarairways.com"},
{name:"Delta",logo:"https://logo.clearbit.com/delta.com"},
{name:"IndiGo",logo:"https://logo.clearbit.com/goindigo.in"},
{name:"Lufthansa",logo:"https://logo.clearbit.com/lufthansa.com"}
]

/* AIRCRAFT */

const aircraftImages={
A320:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Airbus_A320-200.png",
A321:"https://upload.wikimedia.org/wikipedia/commons/0/0c/Airbus_A321.png",
B737:"https://upload.wikimedia.org/wikipedia/commons/7/7c/Boeing_737-800.png",
B787:"https://upload.wikimedia.org/wikipedia/commons/e/e4/Boeing_787_Dreamliner.png",
B777:"https://upload.wikimedia.org/wikipedia/commons/0/0f/Boeing_777-300ER.png",
A350:"https://upload.wikimedia.org/wikipedia/commons/4/4c/Airbus_A350.png",
A380:"https://upload.wikimedia.org/wikipedia/commons/9/9e/Airbus_A380_blue_sky.png"
}

const aircraftTypes=Object.keys(aircraftImages)

/* MAP */

let map=L.map('map').setView([20,0],2)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map)

let routeLayer

/* STATS */

let aircraftStats={}
let lastFlight=null

function rand(list){
return list[Math.floor(Math.random()*list.length)]
}

/* GENERATE FLIGHT */

function generateFlight(){

let selected=document.getElementById("aircraft").value

let aircraft=selected=="ANY"?rand(aircraftTypes):selected
let airline=rand(airlines)

let dep=rand(Object.keys(airports))
let arr=rand(Object.keys(airports))

while(arr==dep){
arr=rand(Object.keys(airports))
}

let flight=airline.name.substring(0,2).toUpperCase()+Math.floor(Math.random()*900+100)
let distance=Math.floor(Math.random()*5000+500)+" NM"

let depData=airports[dep]
let arrData=airports[arr]

lastFlight={flight,dep,arr,aircraft,distance}

/* DISPLAY */

document.getElementById("flight").innerHTML=

"<img class='logo' src='"+airline.logo+"'>"+

"<h3>"+airline.name+"</h3>"+

"<img class='aircraftImg' src='"+aircraftImages[aircraft]+"'>"+

"<p><b>Aircraft:</b> "+aircraft+"</p>"+

"<p><b>Flight:</b> "+flight+"</p>"+

"<hr>"+

"<b>Departure</b><br>"+

dep+" — "+depData.name+"<br>"+

depData.city+", "+depData.country+

"<br><br>"+

"<b>Arrival</b><br>"+

arr+" — "+arrData.name+"<br>"+

arrData.city+", "+arrData.country+

"<br><br>"+

"<b>Distance:</b> "+distance

/* MAP */

let depCoord=[depData.lat,depData.lon]
let arrCoord=[arrData.lat,arrData.lon]

if(routeLayer){
map.removeLayer(routeLayer)
}

routeLayer=L.polyline([depCoord,arrCoord],{color:'red'}).addTo(map)

map.setView(depCoord,3)

L.marker(depCoord).addTo(map)
.bindPopup(depData.name+"<br>"+depData.city+", "+depData.country)

L.marker(arrCoord).addTo(map)
.bindPopup(arrData.name+"<br>"+arrData.city+", "+arrData.country)

}

/* LOG FLIGHT */

function logFlight(){

if(!lastFlight) return

let table=document.getElementById("logTable")

let row=table.insertRow()

row.insertCell(0).innerText=lastFlight.flight
row.insertCell(1).innerText=lastFlight.dep+" → "+lastFlight.arr
row.insertCell(2).innerText=lastFlight.aircraft
row.insertCell(3).innerText=lastFlight.distance

aircraftStats[lastFlight.aircraft]=(aircraftStats[lastFlight.aircraft]||0)+1

updateStats()

}

/* CHART */

let ctx=document.getElementById("aircraftChart").getContext("2d")

let chart=new Chart(ctx,{
type:"doughnut",
data:{labels:[],datasets:[{data:[],backgroundColor:["#ff6384","#36a2eb","#ffce56","#4bc0c0","#9966ff","#ff9f40"]}]}
})

function updateStats(){

chart.data.labels=Object.keys(aircraftStats)
chart.data.datasets[0].data=Object.values(aircraftStats)
chart.update()

let top=Object.entries(aircraftStats)
.sort((a,b)=>b[1]-a[1])
.slice(0,3)

let html=""

top.forEach(t=>{
html+="<p>"+t[0]+" — "+t[1]+" flights</p>"
})

document.getElementById("topAircraft").innerHTML=html

}

</script>

</body>
</html>
