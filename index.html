<!DOCTYPE html>
<html>

<head>

<title>SpiderFly Dispatch Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0c1438;
color:white;
}

header{
background:#0a1b5c;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.controls{
padding:20px;
text-align:center;
}

select{
padding:10px;
margin:6px;
}

button{
padding:10px 14px;
background:#ff3b3b;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:center;
}

#map{
height:420px;
margin:30px;
border-radius:8px;
}

</style>

</head>

<body>

<header>SpiderFly Dispatch System</header>

<div class="controls">

<select id="airline"></select>

<select id="aircraft"></select>

<button onclick="generateRoutes()">Find Routes</button>

</div>

<table id="routesTable">

<tr>
<th>Flight</th>
<th>From</th>
<th>To</th>
<th>Distance</th>
<th>Duration</th>
<th>SimBrief</th>
<th>Map</th>
</tr>

</table>

<div id="map"></div>

<script>

/* AIRPORT DATABASE */

const airports={

EGLL:{name:"Heathrow",city:"London",country:"UK",lat:51.47,lon:-0.45},
EHAM:{name:"Schiphol",city:"Amsterdam",country:"Netherlands",lat:52.31,lon:4.76},
EDDF:{name:"Frankfurt",city:"Frankfurt",country:"Germany",lat:50.03,lon:8.56},
LFPG:{name:"Charles De Gaulle",city:"Paris",country:"France",lat:49.00,lon:2.55},
LEMD:{name:"Madrid",city:"Madrid",country:"Spain",lat:40.47,lon:-3.56},
OMDB:{name:"Dubai",city:"Dubai",country:"UAE",lat:25.25,lon:55.36},
KJFK:{name:"JFK",city:"New York",country:"USA",lat:40.64,lon:-73.77},
KLAX:{name:"Los Angeles",city:"Los Angeles",country:"USA",lat:33.94,lon:-118.40},
VIDP:{name:"Delhi",city:"Delhi",country:"India",lat:28.55,lon:77.10},
VABB:{name:"Mumbai",city:"Mumbai",country:"India",lat:19.08,lon:72.86}

}

/* AIRLINES */

const airlines={

Emirates:["A380","B777","A333"],
Lufthansa:["A320","A321","A333"],
AirFrance:["A320","A321","A359"],
BritishAirways:["A320","A321","B788","A359"],
Delta:["A320","A321","A333"],
United:["B738","B739","B788"],
IndiGo:["A320","A321"],
EasyJet:["A320","A321"]

}

/* AIRCRAFT */

const aircraftTypes=[
"A319","A320","A321","A333","A359","A388",
"B737","B738","B739","B77W","B788","B789"
]

/* MAP */

let map=L.map('map').setView([30,10],3)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map)

let routeLayer

/* INIT */

function init(){

let airlineSelect=document.getElementById("airline")

Object.keys(airlines).forEach(a=>{

let opt=document.createElement("option")
opt.value=a
opt.text=a

airlineSelect.add(opt)

})

let aircraftSelect=document.getElementById("aircraft")

aircraftTypes.forEach(a=>{

let opt=document.createElement("option")
opt.value=a
opt.text=a

aircraftSelect.add(opt)

})

}

init()

/* DISTANCE */

function distance(lat1,lon1,lat2,lon2){

let R=6371

let dLat=(lat2-lat1)*Math.PI/180
let dLon=(lon2-lon1)*Math.PI/180

let a=Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2)

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return Math.round(R*c*0.539957)

}

/* GENERATE ROUTES */

function generateRoutes(){

let airline=document.getElementById("airline").value
let aircraft=document.getElementById("aircraft").value

let table=document.getElementById("routesTable")

table.innerHTML=`

<tr>
<th>Flight</th>
<th>From</th>
<th>To</th>
<th>Distance</th>
<th>Duration</th>
<th>SimBrief</th>
<th>Map</th>
</tr>

`

let keys=Object.keys(airports)

for(let i=0;i<6;i++){

let dep=keys[Math.floor(Math.random()*keys.length)]
let arr=keys[Math.floor(Math.random()*keys.length)]

if(dep==arr) continue

let d=distance(
airports[dep].lat,
airports[dep].lon,
airports[arr].lat,
airports[arr].lon
)

let duration=Math.round(d/450*60)

let hrs=Math.floor(duration/60)
let mins=duration%60

let flight=airline.substring(0,2).toUpperCase()+Math.floor(Math.random()*900)

let row=table.insertRow()

row.insertCell(0).innerText=flight

row.insertCell(1).innerText=dep
row.insertCell(2).innerText=arr

row.insertCell(3).innerText=d+" NM"
row.insertCell(4).innerText=hrs+"h "+mins+"m"

row.insertCell(5).innerHTML=
"<a target='_blank' href='https://dispatch.simbrief.com/options/custom?orig="+dep+"&dest="+arr+"'>SimBrief</a>"

row.insertCell(6).innerHTML=
"<button onclick='showRoute(\""+dep+"\",\""+arr+"\")'>Map</button>"

}

}

/* MAP ROUTE */

function showRoute(dep,arr){

let depData=airports[dep]
let arrData=airports[arr]

let depCoord=[depData.lat,depData.lon]
let arrCoord=[arrData.lat,arrData.lon]

if(routeLayer) map.removeLayer(routeLayer)

routeLayer=L.polyline([depCoord,arrCoord],{color:"red"}).addTo(map)

map.setView(depCoord,4)

L.marker(depCoord).addTo(map)
.bindPopup(depData.name+"<br>"+depData.city+", "+depData.country)

L.marker(arrCoord).addTo(map)
.bindPopup(arrData.name+"<br>"+arrData.city+", "+arrData.country)

}

</script>

</body>
</html>
